<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste com imagens</title>
</head>
<body>
    <h1>Testando cargas de imagens</h1>
    <p>Abaixo voce vai ver uma imagem que esta na mesma pasta:</p>
    <img src="Logo HTML.webp" alt="Logo HTML5">
    <p>Podemos também carregar imagens que estão em sub-pastas</p>
    <img src="Imagens/Logo CSS.png" alt="Logo CSS3">
    <p>Também podemos carregar imagens externas</p>
    <img src="https://tipscode.com.br/uploads/2020/01/js.png" alt="Logo JavaScript"> <!-- URL de uma imagem externa -->
</body>
</html>
