<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizando links</title>

    <style>

        /* # = id 
            . = class
            : = pseudo-classe
            :: = pseudo-elemento
            > = filho
            */

        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        #principal {
            text-align: center;
        }
        a {
            text-decoration: none;
            color: rgb(58, 22, 156);
            font-weight: bold;
        }
        a:hover {
            color: rgb(11, 2, 2);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1 id="principal">fanny la belle reine</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io/" target="_blank">Repositório do GitHub</a></li>
        <li><a href="https://youtube.com/cursoemvideo/" target="_blank">Canal do Youtube</a></li>
        <li>
            <a href="https://www.cursoemvideo.com" target="_blank">Site do CursoemVideo</a>
        </li>
    </ul>
</body>
</html>
