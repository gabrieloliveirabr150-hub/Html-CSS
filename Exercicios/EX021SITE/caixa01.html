<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 { /*Box level*/
        

            background-color: lightcoral;
            height: 300px;
            width: 300px;
            border: 10px solid black;

            padding: 10px;

            margin: 20px auto 40px auto;

            outline: 5px dashed blue;
        }   


        a { /*Inline level*/

            border: 4px solid blue;

            padding: 5px;
        }
        
    </style>
</head>
<body>
    <h1>Exemplo de caixas Box level</h1>
<br>
    <p>Também são exemplos de Box Level, mas os <a href="a">links são exemplos  de caixas inline level</a>. Vamos ver como tudo isso funciona </p>
</body>
</html>
